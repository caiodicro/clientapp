<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informações do Curso</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 0;
            background-color: #f4f4f4;
        }

        #curso-info,
        #usuario-info,
        #curso-todos {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-bottom: 40px;
        }

        h1,
        h2 {
            color: #333;
        }

        #curso-details,
        #usuario-details,
        #lista-cursos-content {
            margin-bottom: 20px;
            color: blue;
        }

        #curso-details p,
        #usuario-details p {
            margin: 5px 0;
        }

        .error {
            color: red;
            font-weight: bold;
        }

        .input-container {
            margin-bottom: 20px;
        }

        .input-container label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .input-container input {
            width: 100%;
            padding: 8px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .input-container button {
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .input-container button:hover {
            background-color: #0056b3;
        }

        #lista-cursos-content ul {
            list-style-type: none;
            padding-left: 0;
        }

        #lista-cursos-content li {
            padding: 10px;
            border-bottom: 1px solid #eee;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <div id="curso-info">
        <h1>Informações do Curso</h1>
        <div class="input-container">
            <label for="curso-id">Digite o ID do curso:</label>
            <input type="number" id="curso-id" placeholder="Ex: 1" min="1">
            <button onclick="fetchData()">Pesquisar Curso</button>
        </div>
        <h2>Curso:</h2>
        <div id="curso-details"></div>
    </div>

    <div id="usuario-info">
        <h1>Informações do Usuário</h1>
        <div class="input-container">
            <label for="usuario-id">Digite o ID do usuário:</label>
            <input type="number" id="usuario-id" placeholder="Ex: 1" min="1">
            <button onclick="fetchUsuarioData()">Pesquisar Usuário</button>
        </div>
        <h2>Usuário:</h2>
        <div id="usuario-details"></div>
    </div>

    <div id="curso-todos">
        <h1>Todos os Cursos</h1>
        <div class="input-container">
            <button onclick="carregarTodosCursos()">Buscar Todos os Cursos</button>
        </div>
        <div id="lista-cursos-content"></div>
    </div>

    <script>
        function fetchData() {
            const cursoId = document.getElementById('curso-id').value;
            if (!cursoId) {
                alert("O campo ID do curso é obrigatório!");
                return;
            }
            const uri = `http://localhost:8080/cursos/id/${cursoId}`;

            async function fetchCursoData() {
                const response = await fetch(uri);
                if (!response.ok) {
                    alert("Não foi possível retornar os dados do curso!");
                    document.getElementById('curso-id').value = "";
                } else {
                    const json = await response.json();
                    const dadosCurso = document.getElementById('curso-details');
                    dadosCurso.innerHTML =
                        `<p><strong>Nome:</strong> ${json.nome}</p>
                        <p><strong>Descrição:</strong> ${json.descricao}</p>
                        <p><strong>Carga Horária:</strong> ${json.cargaHoraria}</p>
                        <p><strong>Número de Vagas:</strong> ${json.numVagas}</p>
                        <p><strong>Data de Início:</strong> ${new Date(json.dataInicio).toLocaleDateString()}</p>
                        <p><strong>Data de Término:</strong> ${new Date(json.dataTermino).toLocaleDateString()}</p>
                        <p><strong>Status:</strong> ${json.status}</p>`;
                }
            }
            fetchCursoData();
        }

        function fetchUsuarioData() {
            const usuarioId = document.getElementById('usuario-id').value;
            if (!usuarioId) {
                alert("O campo ID do usuário é obrigatório!");
                return;
            }
            const uri = `http://localhost:8080/usuarios/id/${usuarioId}`;

            async function fetchUsuario() {
                const response = await fetch(uri);
                if (!response.ok) {
                    alert("Não foi possível retornar os dados do usuário!");
                    document.getElementById('usuario-id').value = "";
                } else {
                    const json = await response.json();
                    const dadosUsuario = document.getElementById('usuario-details');
                    dadosUsuario.innerHTML =
                        `<p><strong>Nome:</strong> ${json.nome}</p>
                        <p><strong>CPF:</strong> ${json.cpf}</p>
                        <p><strong>Tipo:</strong> ${json.tipo}</p>
                        <p><strong>Email:</strong> ${json.email}</p>
                        <p><strong>Data de Nascimento:</strong> ${new Date(json.nascimento).toLocaleDateString()}</p>
                        <p><strong>Endereço:</strong> ${json.endereco}</p>
                        <p><strong>Status:</strong> ${json.status}</p>`;
                }
            }
            fetchUsuario();
        }

        async function carregarTodosCursos() {
            const div = document.getElementById("lista-cursos-content");
            div.innerHTML = "Carregando cursos...";

            try {
                const resposta = await fetch("http://localhost:8080/cursos");
                if (!resposta.ok) throw new Error("Erro ao buscar cursos");

                const cursos = await resposta.json();

                if (cursos.length === 0) {
                    div.innerHTML = "<p>Nenhum curso cadastrado.</p>";
                    return;
                }

                const lista = document.createElement("ul");
                cursos.forEach(curso => {
                    const item = document.createElement("li");
                    item.innerHTML = `
                        <strong>${curso.nome}</strong><br>
                        Início: ${new Date(curso.dataInicio).toLocaleDateString()}<br>
                        Vagas: ${curso.numVagas}<br>
                        Carga Horária: ${curso.cargaHoraria}h<br>
                        Status: ${curso.status}
                    `;
                    lista.appendChild(item);
                });

                div.innerHTML = "";
                div.appendChild(lista);

            } catch (erro) {
                div.innerHTML = `<p class="error">Erro ao carregar cursos: ${erro.message}</p>`;
            }
        }
    </script>
</body>

</html>
